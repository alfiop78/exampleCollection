<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SVG Battery</title>
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
  
  <svg width="200" height="100" viewBox="0 0 120 60" xmlns="www.w3.org">
    <!-- Corpo della batteria -->
    <rect x="5" y="10" width="100" height="40" rx="5" fill="none" stroke="#333" stroke-width="4" />
    <!-- Polo positivo -->
    <rect x="105" y="22" width="7" height="16" rx="2" fill="#333" />
    <!-- Livello carica (ID per JS) -->
    <rect id="battery-level" x="9" y="14" width="44" height="32" rx="2" fill="#4caf50">
      <!-- <animate attributeName="width" dur="1s" from="0" to="44" repeatCount="1"/> -->
      <animate attributeName="width" dur="250ms" from="0" to="44"/>
    </rect>
    <!-- Simbolo Fulmine (ID: charging-icon) -->
    <!-- Nascosto di default con opacity 0 o display none -->
    <!-- originale M62 15 L50 32 H60 L54 48 L68 28 H58 Z -->
    <path id="charging-icon" d="M62 19 L50 32 H60 L54 42 L68 28 H56 Z" 
        fill="#000" stroke="#333" stroke-width="1" />
  </svg>

  <br>

  <!-- Controlli per test -->
  <input type="range" id="charge-slider" step="1" min="0" max="4" value="2">
  <span id="percentage">2</span>
  <script>
    const batteryLevel = document.getElementById('battery-level');
    const slider = document.getElementById('charge-slider');
    const label = document.getElementById('percentage');

    slider.addEventListener('input', (e) => {
        const val = (e.target.value === 'R') ? 0 : e.target.value;
        
        // Aggiorna la larghezza (max 92 unità nel viewBox)
        // const newWidth = (val / 100) * 92;
        const newWidth = (val / 4) * 100 - 8;

        const animateRef = batteryLevel.querySelector('animate');
        animateRef.setAttribute("from", batteryLevel.getAttribute("width"));
        animateRef.setAttribute("to", newWidth);
        batteryLevel.setAttribute('width', newWidth);
      animateRef.beginElement();
        
        // Cambia colore in base alla carica
        if (val < 2) {
            batteryLevel.setAttribute('fill', '#f44336'); // Rosso
        } else if (val < 3) {
            batteryLevel.setAttribute('fill', '#ffeb3b'); // Giallo
        } else {
            batteryLevel.setAttribute('fill', '#4caf50'); // Verde
        }
        
        label.innerText = val;
    });

    </script>
  </body>
</html>
